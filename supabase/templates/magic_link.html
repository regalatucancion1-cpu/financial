<!DOCTYPE html>
<html lang="es">
  <body style="font-family: -apple-system, Helvetica, Arial, sans-serif; background: #0c0a09; color: #e7e5e4; padding: 32px; margin: 0;">
    <div style="max-width: 420px; margin: 0 auto;">
      <p style="font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #78716c; margin: 0 0 4px;">
        Control Financiero
      </p>
      <h1 style="font-size: 22px; margin: 0 0 24px;">Tu código de acceso</h1>
      <div style="background: #1c1917; border: 1px solid #292524; border-radius: 16px; padding: 24px; text-align: center;">
        <p style="font-size: 36px; font-weight: 700; letter-spacing: 8px; margin: 0; font-variant-numeric: tabular-nums;">
          {{ .Token }}
        </p>
      </div>
      <p style="font-size: 13px; color: #78716c; margin: 20px 0 0;">
        Escribe este código en la pantalla de la app. Caduca en 1 hora.
      </p>
    </div>
  </body>
</html>
